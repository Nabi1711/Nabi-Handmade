<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:linear-gradient(135deg,#ffe6f0,#fff6e6);
        }

        h1{
            text-align:center;
            margin-top:20px;
        }

        .cart-container{
            max-width:800px;
            margin:20px auto;
            background:white;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            overflow:hidden;
        }

        .cart-header{
            background:linear-gradient(45deg,#ffb6c1,#ffd6e0);
            padding:15px;
            text-align:center;
            font-weight:bold;
            font-size:20px;
        }

        .total{
            padding:20px;
            text-align:right;
            font-size:18px;
            font-weight:bold;
        }

        .copy-btn{
            display:block;
            margin:10px auto 20px;
            padding:12px 20px;
            border:none;
            background:linear-gradient(45deg,#ff69b4,#ffa6c9);
            color:white;
            border-radius:12px;
            cursor:pointer;
        }

        .empty{
            padding:20px;
            text-align:center;
            color:#777;
        }
    </style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div class="cart-container">

    <div class="cart-header">🧾 Order Voucher</div>

    <div id="cart"></div>

    <div id="total" class="total"></div>

</div>

<button class="copy-btn" onclick="copyOrder()">📋 Copy Order</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ================= RENDER ================= */
function renderCart(){

    cart = JSON.parse(localStorage.getItem("cart")) || [];

    let html = "";
    let total = 0;

    if(cart.length === 0){
        document.getElementById("cart").innerHTML =
        "<div class='empty'>🛒 Cart is empty</div>";
        document.getElementById("total").innerText = "";
        return;
    }

    cart.forEach((item,index)=>{

        let price = Number(item.price || 0);
        let qty = Number(item.qty || 0);

        let sum = price * qty;
        total += sum;

        html += `
        <div style="display:flex;justify-content:space-between;padding:12px;border-bottom:1px dashed #ddd;align-items:center;">

            <div style="text-align:left;">
                🛍 ${item.name || "Item"}<br>
                <small>${price} MMK</small>
            </div>

            <div>
                <button onclick="decrease(${index})">-</button>
                ${qty}
                <button onclick="increase(${index})">+</button>
            </div>

            <div>${sum} MMK</div>

        </div>
        `;
    });

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText = "Total: " + total + " MMK";
}

/* ================= UPDATE ================= */
function increase(i){
    cart[i].qty = Number(cart[i].qty || 0) + 1;
    save();
}

function decrease(i){
    if(cart[i].qty > 1){
        cart[i].qty--;
    }else{
        cart.splice(i,1);
    }
    save();
}

function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* ================= COPY ORDER ================= */
function copyOrder(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }

    let text = "🧾 ORDER\n\n";
    let total = 0;

    cart.forEach(item=>{

        let price = Number(item.price || 0);
        let qty = Number(item.qty || 0);

        let sum = price * qty;
        total += sum;

        text += ${item.name} x${qty} = ${sum} MMK\n;
    });

    text += \nTOTAL: ${total} MMK;

    navigator.clipboard.writeText(text)
    .then(()=> alert("Copied!"))
    .catch(()=> alert("Copy failed"));

}

renderCart();

</script>

</body>
</html>
