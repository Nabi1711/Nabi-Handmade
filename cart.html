<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:linear-gradient(135deg,#ffe6f0,#fff6e6);
        }

        h1{
            text-align:center;
            margin-top:20px;
        }

        /* CART BOX */
        .cart-container{
            max-width:800px;
            margin:20px auto;
            background:white;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
            overflow:hidden;
        }

        /* header */
        .cart-header{
            background:linear-gradient(45deg,#ffb6c1,#ffd6e0);
            padding:15px;
            text-align:center;
            font-weight:bold;
            font-size:20px;
        }

        /* item */
        .item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px;
            border-bottom:1px dashed #ddd;
        }

        .name{
            flex:1;
            text-align:left;
        }

        .qty button{
            background:black;
            color:white;
            border:none;
            padding:5px 10px;
            border-radius:6px;
            cursor:pointer;
        }

        .total{
            padding:20px;
            text-align:right;
            font-size:18px;
            font-weight:bold;
        }

        /* button */
        .copy-btn{
            display:block;
            margin:10px auto 20px;
            padding:12px 20px;
            border:none;
            background:linear-gradient(45deg,#ff69b4,#ffa6c9);
            color:white;
            border-radius:12px;
            cursor:pointer;
        }

        .empty{
            padding:20px;
            text-align:center;
            color:#777;
        }
    </style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div class="cart-container">

    <div class="cart-header">🧾 Fairy Order Voucher</div>

    <div id="cart"></div>

    <div id="total" class="total"></div>

</div>

<button class="copy-btn" onclick="copyOrder()">📋 Copy Order</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ================= RENDER ================= */
function renderCart(){

    let html = "";
    let total = 0;

    if(cart.length === 0){
        document.getElementById("cart").innerHTML =
        "<div class='empty'>🛒 Cart is empty</div>";
        document.getElementById("total").innerText = "";
        return;
    }

    cart.forEach((item,index)=>{

        let sum = item.price * item.qty;
        total += sum;

        html += `
        <div class="item">

            <div class="name">
                🛍 ${item.name}<br>
                <small>${item.price} MMK</small>
            </div>

            <div class="qty">
                <button onclick="decrease(${index})">-</button>
                ${item.qty}
                <button onclick="increase(${index})">+</button>
            </div>

            <div>${sum} MMK</div>

        </div>
        `;
    });

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText = "Total: " + total + " MMK";
}

/* ================= UPDATE ================= */
function increase(i){
    cart[i].qty++;
    save();
}

function decrease(i){
    if(cart[i].qty > 1){
        cart[i].qty--;
    }else{
        cart.splice(i,1);
    }
    save();
}

function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* ================= COPY ORDER ================= */
function copyOrder(){

    let text = "🧾 NABI ORDER\n\n";
    let total = 0;

    cart.forEach(item=>{
        let sum = item.price * item.qty;
        total += sum;

        text += ${item.name} x${item.qty} = ${sum} MMK\n;
    });

    text += "\nTOTAL: " + total + " MMK";

    navigator.clipboard.writeText(text);
    alert("Copied!");
}

renderCart();

</script>

</body>
</html>
